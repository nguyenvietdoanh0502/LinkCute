server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/roamly}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      repositories:
        enabled: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  flyway:
    enabled: true
    baseline-on-migrate: true

roamly:
  places:
    csv-path: ${PLACE_DATA_CSV_PATH:data/full_data.csv}
    overture-path: ${OVERTURE_DATA_PATH:data/overture-hanoi.geojson}
    osm-path: ${OSM_DATA_PATH:data/osm-hanoi.json}
    min-overture-confidence: ${MIN_OVERTURE_CONFIDENCE:0.60}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 86400000 # 24h
    refresh-token-expiration: 2592000000
    reset-password-expiration: ${RESET_PASSWORD_TOKEN_EXPIRATION:300000} # 5 minutes

logging:
  level:
    com.hit.roamly: DEBUG
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
